name: AdminWatcher
version: '${project.version}'
main: pl.grokdev.adminwatcher.AdminWatcher
api-version: 1.21
load: STARTUP
author: Grok MC Developer
description: Monitoruje administrację - gm1, give i podejrzane komendy

commands:
  adminwatcher:
    description: Komenda główna pluginu AdminWatcher
    usage: /<command> [reload]
    permission: adminwatcher.admin

permissions:
  adminwatcher.admin:
    description: Dostęp do komendy /adminwatcher
    default: op
  adminwatcher.bypass:
    description: Pomija logowanie akcji
    default: false