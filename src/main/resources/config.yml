# AdminWatcher v2.3 - Konfiguracja

log-creative: true

monitored-commands:
  - give
  - minecraft:give
  - i
  - item
  - gamemode
  - gm
  - op
  - deop
  - enchant
  - effect
  - summon

# Discord
 discord:
  enabled: false
  webhook-url: ""

# Wykrywanie podejrzanej aktywności
suspicious:
  enabled: true
  creative-give-window: 60
  # Minimalna ilość itemów do uznania za podejrzaną (przy give)
  min-give-amount: 32

# Opcje auto-reakcji (ostrożnie!)
auto-actions:
  enabled: false
  on-suspicious: "warn"   # warn / kick / ban

max-logs-memory: 500