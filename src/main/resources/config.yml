# AdminWatcher v2.0 - Konfiguracja

# Logowanie zmiany na creative
log-creative: true

# Lista komend do monitorowania (bez /)
monitored-commands:
  - give
  - minecraft:give
  - i
  - item
  - gamemode
  - gm
  - op
  - deop
  - enchant
  - effect
  - summon
  - clear
  - xp

# Integracja Discord (webhook)
discord:
  enabled: false
  webhook-url: "https://discord.com/api/webhooks/TWOJ_WEBHOOK_TUTAJ"

# Wykrywanie podejrzanej aktywności
suspicious-activity:
  enabled: true
  # Okno czasowe w sekundach dla creative + give
  creative-give-window-seconds: 30

# Ile ostatnich logów przechowywać w pamięci (do /adminlogs)
max-logs-in-memory: 500