# AdminWatcher v2.2
# Czysta konfiguracja

log-creative: true

# Komendy które będziemy logować
monitored-commands:
  - give
  - minecraft:give
  - i
  - item
  - gamemode
  - gm
  - op
  - deop
  - enchant
  - effect
  - summon

# Discord webhook (opcjonalnie)
discord:
  enabled: false
  webhook-url: ""

# Ustawienia wykrywania podejrzanej aktywności
suspicious:
  enabled: true
  # Okno w sekundach: creative + give = alert
  creative-give-window: 45

# Ile logów trzymać w pamięci do komendy /adminlogs
max-logs-memory: 300